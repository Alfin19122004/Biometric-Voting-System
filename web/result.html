<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Results | Election Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #3b82f6;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --gold: #fbbf24;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .live-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #ef4444;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 12px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Results Table Styling */
        .results-wrapper {
            background: var(--card);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.25rem 1.5rem;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 1rem;
            transition: background 0.3s;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .candidate-name {
            font-weight: 700;
            color: white;
        }

        .party-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .votes-count {
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gold);
        }

        /* Locked State UI */
        .locked-msg {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }

        .locked-msg i {
            display: block;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            body { padding: 1rem; }
            th, td { padding: 1rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="live-tag">● Live Count</div>
        <h1>Election Leaderboard</h1>
    </header>

    <div class="results-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Candidate</th>
                    <th>Affiliation</th>
                    <th style="text-align: right;">Total Votes</th>
                </tr>
            </thead>
            <tbody id="tbl">
                </tbody>
        </table>
    </div>
</div>

<script>
setInterval(() => {
    fetch("/results_data")
    .then(res => res.json())
    .then(data => {
        const tableBody = document.getElementById("tbl");

        if(data.status == "locked") {
            tableBody.innerHTML = `
                <tr>
                    <td colspan="3" class="locked-msg">
                        <i>🔒</i>
                        <strong>RESULTS ARE CURRENTLY ENCRYPTED</strong><br>
                        Verification in progress by election officials.
                    </td>
                </tr>`;
            return;
        }

        // Sort data by votes descending to keep the leader at the top
        data.sort((a, b) => b.votes - a.votes);

        let rows = "";
        data.forEach((r, index) => {
            rows += `
            <tr>
                <td>
                    <div class="candidate-name">${r.name}</div>
                    ${index === 0 ? '<span style="font-size:0.6rem; color:var(--gold)">✦ CURRENT LEADER</span>' : ''}
                </td>
                <td><span class="party-tag">${r.party}</span></td>
                <td style="text-align: right;">
                    <div class="votes-count">${r.votes.toLocaleString('en-IN')}</div>
                </td>
            </tr>`;
        });
        tableBody.innerHTML = rows;
    })
    .catch(err => {
        console.error("Fetch error:", err);
    });
}, 2000);
</script>

</body>
</html>
