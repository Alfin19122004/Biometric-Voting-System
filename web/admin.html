<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control | Secure Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #3b82f6;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 80%);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 2rem;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
        }

        .admin-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            width: 100%;
            max-width: 1300px;
        }

        .card {
            background: var(--card);
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* --- Tooltip Logic --- */
        [data-tooltip] {
            position: relative;
            cursor: pointer;
        }

        [data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #1e293b;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            border: 1px solid var(--accent);
            z-index: 100;
            pointer-events: none;
        }

        [data-tooltip]:hover::after {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) scale(1);
        }

        /* --- Typography & Elements --- */
        h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 0.5rem; text-align: center; }
        h2 { font-size: 0.8rem; text-transform: uppercase; color: var(--accent); margin: 1.5rem 0 1rem; letter-spacing: 1px; border-bottom: 1px solid var(--glass-border); padding-bottom: 5px; }
        
        .shield-icon { width: 40px; height: 40px; background: rgba(59, 130, 246, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; color: var(--accent); }

        input {
            width: 100%; padding: 10px; background: #1e293b; border: 1px solid var(--glass-border);
            border-radius: 8px; color: white; font-size: 0.85rem; margin-bottom: 8px;
        }

        button {
            width: 100%; padding: 10px; border-radius: 8px; border: none; font-weight: 700;
            font-size: 0.8rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--glass-border); color: white; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px dashed var(--danger); }
        button:hover { filter: brightness(1.2); transform: translateY(-1px); }

        /* --- Viewer (Terminal Style) --- */
        pre {
            background: #000;
            color: #10b981;
            padding: 15px;
            border-radius: 12px;
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #1e293b;
            margin-top: 10px;
        }

        .grid-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }

        @media (max-width: 1000px) { .admin-container { grid-template-columns: 1fr; } .grid-panel { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="admin-container">
    
    <aside class="card">
        <div class="shield-icon">🛡️</div>
        <h1>System Master</h1>
        <p style="text-align:center; color:var(--text-dim); font-size:0.7rem; text-transform:uppercase; margin-bottom:2rem;">Secure Access Only</p>

        <input type="password" id="pass" placeholder="Admin Key">
        
        <div style="display:flex; flex-direction:column; gap:10px;">
            <button class="btn-primary" data-tooltip="Make results public for all users" onclick="publish()">Publish Results</button>
            <button class="btn-outline" data-tooltip="Stop all voting and result viewing" onclick="lock()">Lock Portal</button>
            <button class="btn-danger" data-tooltip="Wipe all voters, candidates, and logs" onclick="resetElection()">Full System Reset</button>
        </div>
    </aside>

    <main class="card">
        <div class="grid-panel">
            
            <div>
                <h2>Voter Registration</h2>
                <input type="text" id="voterName" placeholder="Voter Name">
                <input type="number" id="fingerID" placeholder="Fingerprint ID">
                <button class="btn-primary" data-tooltip="Link a name to a fingerprint ID" onclick="addVoter()">Add Voter</button>

                <h2>Candidate Setup</h2>
                <input type="text" id="candidateName" placeholder="Candidate Name">
                <button class="btn-primary" data-tooltip="Add a new person to the ballot" onclick="addCandidate()">Add Candidate</button>
                
                <h2 style="color:var(--danger)">Danger Zone</h2>
                <button class="btn-danger" data-tooltip="Set all candidate vote counts to zero" onclick="resetVotes()">Reset All Votes</button>
            </div>

            <div>
                <h2>Registered Voters</h2>
                <button class="btn-outline" data-tooltip="Fetch voter database and voting status" onclick="loadVoters()">Show Voters List</button>
                <pre id="voterList">System ready...</pre>

                <h2>Candidate Status</h2>
                <button class="btn-outline" data-tooltip="Fetch all candidates and current tallies" onclick="loadCandidates()">Show Candidates List</button>
                <pre id="candidateList">Waiting for fetch...</pre>
            </div>

        </div>
    </main>
</div>

<script>
// --- AUTH & MASTER FUNCTIONS ---
function publish(){
    fetch("/publish_results",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({password:document.getElementById("pass").value})
    }).then(res=>res.json()).then(data=>alert(data.status));
}

function lock(){
    fetch("/lock_results",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({password:document.getElementById("pass").value})
    }).then(res=>res.json()).then(data=>alert(data.status));
}

function resetElection(){
    if(confirm("DANGER: This wipes EVERYTHING. Continue?")){
        fetch("/reset_all",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({password:document.getElementById("pass").value})
        }).then(res=>res.json()).then(data=>alert(data.status));
    }
}

// --- DATABASE FUNCTIONS ---
function addVoter() {
    fetch('/add_voter', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            name: document.getElementById('voterName').value,
            fingerprint_id: document.getElementById('fingerID').value
        })
    }).then(res => res.json()).then(data => alert(data.status));
}

function addCandidate() {
    fetch('/add_candidate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ name: document.getElementById('candidateName').value })
    }).then(res => res.json()).then(data => alert(data.status));
}

function resetVotes() {
    if(confirm("Reset all current vote counts?")){
        fetch('/reset_votes', { method: 'POST' })
        .then(res => res.json()).then(data => alert(data.status));
    }
}

// --- VIEWING FUNCTIONS ---
function loadVoters() {
    fetch('/view_voters')
    .then(res => res.json())
    .then(data => {
        let output = data.length > 0 ? "" : "No voters found.";
        data.forEach(v => {
            output += `[ID: ${v.id}] ${v.name.padEnd(15)} | Finger: ${v.fingerprint_id} | Voted: ${v.voted}\n`;
        });
        document.getElementById("voterList").innerText = output;
    });
}

function loadCandidates() {
    fetch('/view_candidates')
    .then(res => res.json())
    .then(data => {
        let output = data.length > 0 ? "" : "No candidates found.";
        data.forEach(c => {
            output += `[ID: ${c.id}] ${c.name.padEnd(15)} | Votes: ${c.votes}\n`;
        });
        document.getElementById("candidateList").innerText = output;
    });
}
</script>

</body>
</html>
